<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>iBOT — Agencja SEO | Lokalne SEO w Polsce</title>

    <!-- GLOBAL JSON-LD: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "iBOT — Agencja SEO",
      "url": "https://ibot-agencja-seo.vercel.app",
      "logo": "https://ibot-agencja-seo.vercel.app/logo.png"
    }
    </script>

    <!-- GLOBAL JSON-LD: WebSite + SearchAction -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "url": "https://ibot-agencja-seo.vercel.app",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://ibot-agencja-seo.vercel.app/szukaj?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
